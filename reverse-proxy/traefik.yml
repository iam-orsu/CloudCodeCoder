# ==========================================
# Traefik Static Configuration
# ==========================================

api:
  insecure: true
  dashboard: true

entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: cloudcode-net

# Note: Let's Encrypt requires a valid domain name. 
# Since this deployment runs on a raw IP address, we do not configure ACME/Let's Encrypt.
